<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haatke — Seller</title>
<style>
:root{--red:#C62828;--red-dark:#B71C1C;--red-light:#FFEBEE;--red-mid:#EF9A9A;--bg:#F7F7F7;--white:#fff;--text:#1a1a1a;--muted:#757575;--border:#e8e8e8;--green:#2E7D32;--green-bg:#E8F5E9;--green-border:#A5D6A7;--amber:#F57F17;--amber-bg:#FFF8E1;--blue:#1565C0;--blue-bg:#E3F2FD;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* SIDEBAR */
.sidebar{width:230px;background:var(--white);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:200;}
.logo{padding:18px 20px;border-bottom:1px solid var(--border);}
.logo h1{font-size:22px;font-weight:900;color:var(--red);}
.logo p{font-size:11px;color:var(--muted);margin-top:2px;}
.sidenav{flex:1;padding:10px;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:none;background:none;width:100%;text-align:left;font-size:14px;color:var(--muted);cursor:pointer;margin-bottom:2px;transition:all .15s;}
.ni:hover,.ni.active{background:var(--red-light);color:var(--red);}
.ni .ic{font-size:18px;width:22px;text-align:center;}
.nbadge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center;}
.shop-foot{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.savt{width:36px;height:36px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;}
/* MAIN */
.main{margin-left:230px;min-height:100vh;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar h2{font-size:18px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.content{padding:24px;}
/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;}
.card-sm{padding:14px;}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
.stat-value{font-size:24px;font-weight:700;}
.stat-sub{font-size:11px;margin-top:4px;}
/* BUTTONS */
.btn{padding:9px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.btn-primary{background:var(--red);color:#fff;}
.btn-success{background:var(--green);color:#fff;}
.btn-danger{background:#fff;color:#d32f2f;border:1px solid #FFCDD2;}
.btn-ghost{background:#f0f0f0;color:var(--muted);}
.btn-outline{background:#fff;color:var(--red);border:1px solid var(--red);}
.btn-sm{padding:6px 13px;font-size:12px;}
.btn-lg{padding:13px 24px;font-size:15px;font-weight:600;}
/* BADGES */
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.b-new{background:var(--amber-bg);color:var(--amber);border:1px solid #FFE082;}
.b-active{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.b-done{background:#f5f5f5;color:#757575;border:1px solid #e0e0e0;}
.b-rejected{background:var(--red-light);color:var(--red);border:1px solid var(--red-mid);}
/* TABS */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tb{padding:10px 18px;background:none;border:none;border-bottom:2px solid transparent;font-size:14px;color:var(--muted);cursor:pointer;margin-bottom:-1px;}
.tb.active{color:var(--red);border-bottom-color:var(--red);font-weight:500;}
/* ORDER CARD */
.order-card{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.order-head{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #fafafa;}
.order-id{font-size:14px;font-weight:600;}
.order-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.order-body{padding:12px 16px;}
.order-row{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;border-bottom:1px solid #fafafa;}
.order-row:last-child{border:none;}
.order-foot{padding:11px 16px;background:#fafafa;display:flex;align-items:center;gap:8px;}
.timer{font-size:13px;font-weight:700;color:var(--red);background:var(--red-light);padding:4px 10px;border-radius:6px;}
/* PRODUCT GRID */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.prod-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.prod-img{height:110px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;}
.oos-badge{position:absolute;top:7px;right:7px;background:#d32f2f;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;}
.prod-info{padding:11px 13px;}
.prod-name{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-price{font-size:14px;font-weight:700;color:var(--red);}
.prod-stock{font-size:11px;color:var(--muted);margin-top:2px;}
.prod-foot{padding:9px 13px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tog{width:36px;height:20px;border-radius:10px;background:#ddd;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tog.on{background:var(--red);}
.tog::after{content:'';width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;}
.tog.on::after{left:19px;}
.add-placeholder{background:var(--white);border:2px dashed var(--red-mid);border-radius:12px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--red);transition:background .15s;}
.add-placeholder:hover{background:var(--red-light);}
/* FORM */
.form-max{max-width:640px;}
.fg{margin-bottom:18px;}
.fl{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px;display:block;}
.fi,.fs,.fta{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:#fff;color:var(--text);}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--red);}
.fta{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.photo-area{border:2px dashed var(--red-mid);border-radius:10px;padding:28px;text-align:center;cursor:pointer;background:var(--red-light);margin-bottom:18px;}
.photo-area:hover{background:#FFCDD2;}
.photo-area p{font-size:14px;color:var(--red);font-weight:500;margin-top:6px;}
.photo-area small{font-size:12px;color:var(--muted);}
.ai-banner{background:#4A148C;border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;color:#fff;}
.ai-banner strong{font-size:14px;}
.ai-banner p{font-size:12px;opacity:.85;margin-top:2px;}
.size-tags{display:flex;flex-wrap:wrap;gap:8px;}
.stag{padding:7px 14px;border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;background:#fff;transition:all .15s;}
.stag.sel{border-color:var(--red);background:var(--red-light);color:var(--red);font-weight:500;}
.ai-prog{margin-bottom:18px;}
.ai-prog-bar{background:#eee;border-radius:4px;height:6px;overflow:hidden;margin-top:6px;}
.ai-prog-fill{height:100%;background:var(--red);border-radius:4px;transition:width .4s;}
/* EARNINGS */
.earn-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
.bars{display:flex;align-items:flex-end;gap:8px;height:120px;margin-bottom:8px;}
.bar-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-f{width:100%;border-radius:4px 4px 0 0;}
.bar-lbl{font-size:10px;color:var(--muted);}
.bar-v{font-size:9px;color:var(--muted);}
.p-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #fafafa;font-size:14px;}
.p-row:last-child{border:none;font-weight:700;font-size:15px;}
/* PROFILE FORM */
.prof-hero{background:var(--red);border-radius:12px;padding:22px;color:#fff;display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.prof-ava{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.info-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;}
.info-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.info-value{font-size:15px;font-weight:600;}
/* PRESCRIPTIONS */
.rx-card{background:#fff;border:1px solid #9FA8DA;border-radius:12px;margin-bottom:14px;overflow:hidden;}
.rx-head{background:#E8EAF6;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;}
.med-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #fafafa;font-size:14px;}
.med-row:last-child{border:none;}
/* ALERT BANNER */
.alert-banner{border-radius:10px;padding:13px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.ab-new{background:var(--amber-bg);border:1px solid #FFE082;}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#222;color:#fff;padding:13px 20px;border-radius:10px;font-size:14px;z-index:999;display:none;max-width:320px;}
.toast.show{display:block;animation:sup .3s ease;}
@keyframes sup{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
@keyframes pulse{from{opacity:.3;transform:scale(.8)}to{opacity:1;transform:scale(1.1)}}
/* RESPONSIVE */
@media(max-width:900px){.stats-grid{grid-template-columns:1fr 1fr;}.earn-grid{grid-template-columns:1fr;}.info-grid{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}}
@media(max-width:768px){
  .sidebar{display:none;}
  .main{margin-left:0;}
  .content{padding:12px;}
  .bnav{display:flex!important;align-items:center;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:100;padding:6px 0 calc(6px + env(safe-area-inset-bottom));}
  .main{padding-bottom:80px;}
  .topbar{padding:10px 14px;}
  .topbar h2{font-size:16px;font-weight:600;}
  #today-date,#notif-btn,#topbar-add-btn{display:none!important;}
  #shop-toggle-btn{font-size:11px!important;padding:5px 11px!important;border-radius:20px!important;font-weight:600!important;}
  .stats-grid{grid-template-columns:1fr 1fr!important;}
  .prod-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));}
  .toast{bottom:90px;right:12px;left:12px;max-width:none;}
  .form-row{grid-template-columns:1fr;}
  .info-grid{grid-template-columns:1fr;}
  .earn-grid{grid-template-columns:1fr;}
}
.bnav{display:none;}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--muted);cursor:pointer;border:none;background:none;padding:4px 2px;min-width:0;}
.bni.active{color:var(--red);}
.bni-ic{font-size:20px;line-height:1.1;}
.bni-fab{display:flex;width:42px;height:42px;border-radius:50%;background:var(--red);align-items:center;justify-content:center;font-size:20px;box-shadow:0 3px 10px rgba(198,40,40,.35);margin-bottom:1px;}
/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ei{font-size:48px;margin-bottom:12px;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo"><h1>Haatke</h1><p>Seller Dashboard</p></div>
  <nav class="sidenav">
    <button class="ni active" onclick="go('dashboard')"><span class="ic">🏠</span>Dashboard</button>
    <button class="ni" onclick="go('orders')" id="ni-orders"><span class="ic">📦</span>Orders<span class="nbadge" id="new-badge" style="display:none">0</span></button>
    <button class="ni" onclick="go('products')"><span class="ic">👕</span>My Products</button>
    <button class="ni" onclick="go('add')"><span class="ic">➕</span>Add Product</button>
    <button class="ni" onclick="go('earnings')"><span class="ic">💰</span>Earnings</button>
    <button class="ni" onclick="go('offers')"><span class="ic">🏷️</span>Offers & Coupons</button>
    <button class="ni" onclick="go('analytics')"><span class="ic">📊</span>Analytics</button>
    <button class="ni" onclick="go('prescriptions')" id="ni-rx"><span class="ic">💊</span>Prescriptions<span class="nbadge" id="rx-badge" style="display:none">0</span></button>
    <button class="ni" onclick="go('delivery')" id="ni-delivery"><span class="ic">🛵</span>Delivery</button>
    <button class="ni" onclick="go('profile')"><span class="ic">🏪</span>My Shop</button>
  </nav>
  <div class="shop-foot" onclick="toggleShop()" style="cursor:pointer" title="Click to open/close shop">
    <div class="savt" id="shop-initial">M</div>
    <div><div style="font-size:13px;font-weight:500" id="shop-name-foot">My Shop</div><div style="font-size:11px;" id="shop-status-foot">● Open</div></div>
  </div>
</div>

<nav class="bnav" id="bnav"></nav>

<div class="main">
  <div class="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div class="topbar-right">
      <span style="font-size:13px;color:var(--muted)" id="today-date"></span>
      <button id="notif-btn" class="btn btn-ghost btn-sm" onclick="requestNotifPerm()" title="Enable order notifications">🔔 Notify me</button>
      <button id="shop-toggle-btn" onclick="toggleShop()" class="btn btn-sm" style="font-weight:600"></button>
      <button id="topbar-add-btn" class="btn btn-primary btn-sm" onclick="go('add')">+ Add Product</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- EDIT PRODUCT MODAL -->
<div class="modal-bg" id="edit-modal">
  <div class="modal" style="max-height:90vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 style="margin:0">Edit Product</h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <!-- Photo editor -->
    <div style="margin-bottom:14px">
      <label class="fl">Photos</label>
      <input type="file" id="e-photo-input" accept="image/*" capture="environment" style="display:none" onchange="addEditPhoto(this)">
      <div id="e-photo-grid" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px"></div>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('e-photo-input').click()">📷 Add photo</button>
    </div>
    <div class="fg"><label class="fl">Product name</label><input class="fi" id="e-name"></div>
    <div class="form-row">
      <div class="fg"><label class="fl">Price (₹)</label><input class="fi" id="e-price" type="number"></div>
      <div class="fg"><label class="fl">Original price (₹)</label><input class="fi" id="e-orig" type="number"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Stock quantity</label><input class="fi" id="e-stock" type="number"></div>
      <div class="fg"><label class="fl">Low stock alert at</label><input class="fi" id="e-lowstock" type="number" placeholder="e.g. 3"></div>
    </div>
    <div class="fg"><label class="fl">Sizes / Options</label><input class="fi" id="e-sizes" placeholder="S, M, L, XL"></div>
    <div class="fg"><label class="fl">Category</label>
      <select class="fs" id="e-cat">
        ${['Kurti','Saree','Lehenga','Suit','Dupatta','Electronics','Mobile','Plant','Beauty','Medicine','Grocery','Book','Toy','Other'].map(o=>`<option>${o}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><label class="fl">Description</label><textarea class="fta" id="e-desc"></textarea></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">Save changes</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- IN-APP CAMERA MODAL -->
<div class="modal-bg" id="camera-modal" style="padding:0;align-items:stretch;justify-content:stretch">
  <div style="position:relative;width:100%;height:100%;max-width:600px;margin:auto;background:#000;display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(0,0,0,.7);position:absolute;top:0;left:0;right:0;z-index:10">
      <div style="color:#fff;font-size:15px;font-weight:600">📷 Take product photo</div>
      <button onclick="closeCameraModal()" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer">✕</button>
    </div>
    <video id="cam-preview" autoplay playsinline style="width:100%;height:100%;object-fit:cover;min-height:60vh"></video>
    <div id="cam-no-support" style="display:none;color:#fff;text-align:center;padding:40px;font-size:14px">Camera not available on this device/browser.<br>Use the file picker instead.</div>
    <!-- Guide overlay -->
    <div style="position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center">
      <div style="width:70%;aspect-ratio:1;border:2px solid rgba(255,255,255,.5);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.3)"></div>
    </div>
    <!-- Bottom controls -->
    <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);padding:20px;display:flex;align-items:center;justify-content:center;gap:24px">
      <button id="cam-flip-btn" onclick="flipCamera()" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer" title="Flip camera">🔄</button>
      <button onclick="capturePhoto()" style="width:68px;height:68px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.6);cursor:pointer;font-size:28px" title="Take photo">📸</button>
      <button onclick="closeCameraModal();document.getElementById('cam-input').click()" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer" title="Pick from gallery">🖼️</button>
    </div>
  </div>
</div>

<!-- ADD ORDER MODAL (for testing) -->
<div class="modal-bg" id="order-modal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 style="margin:0">Simulate Incoming Order</h3>
      <button onclick="closeOrderModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div class="fg"><label class="fl">Customer name</label><input class="fi" id="o-name" value="Priya Sharma"></div>
    <div class="form-row">
      <div class="fg"><label class="fl">Phone</label><input class="fi" id="o-phone" value="9876543210"></div>
      <div class="fg"><label class="fl">Payment</label>
        <select class="fs" id="o-pay"><option value="COD">Cash on Delivery</option><option value="Prepaid">Prepaid (Online)</option></select>
      </div>
    </div>
    <div class="fg"><label class="fl">Select product</label>
      <select class="fs" id="o-prod"></select>
    </div>
    <div class="fg"><label class="fl">Quantity</label><input class="fi" id="o-qty" type="number" value="1" min="1"></div>
    <div class="fg"><label class="fl">Customer note (optional)</label><input class="fi" id="o-notes" placeholder="e.g. Please pack in gift wrap"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" style="flex:1" onclick="createOrder()">Create order</button>
      <button class="btn btn-ghost" onclick="closeOrderModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// DATA LAYER — localStorage persistence
// ══════════════════════════════════════════════════

function loadData(key, def) {
  try { const v = localStorage.getItem('haatke_'+key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function saveData(key, val) {
  try { localStorage.setItem('haatke_'+key, JSON.stringify(val)); } catch(e) {}
}

// Seed default data only on first load
function seedDefaults() {
  if (!localStorage.getItem('haatke_seeded')) {
    saveData('products', [

function go(screen) {
  Object.values(timers).forEach(clearInterval);
  timers = {};
  curScreen = screen;
  // Match by onclick attribute so hidden items don't break indices
  const target = `go('${screen}')`;
  document.querySelectorAll('.ni').forEach(e=>e.classList.toggle('active', e.getAttribute('onclick')===target));
  document.querySelectorAll('.bni').forEach(e=>e.classList.toggle('active', e.getAttribute('onclick')===target));
  document.getElementById('page-title').textContent = titles[screen]||screen;
  refreshBadges();
  const fn = {dashboard:renderDashboard,orders:renderOrders,products:renderProducts,add:renderAdd,earnings:renderEarnings,offers:renderOffers,analytics:renderAnalytics,delivery:renderDelivery,prescriptions:renderRx,profile:renderProfile};
  fn[screen]?.();
}

function requestNotifPerm(){
  if(!('Notification' in window)){toast('Your browser does not support notifications.');return;}
  Notification.requestPermission().then(p=>{
    refreshBadges();
    if(p==='granted') toast('✅ Notifications ON — you\'ll get alerted for every new order!');
    else toast('Notifications blocked. Enable from browser settings.');
  });
}
function fireNotif(title, body){

}

function statusBadge(s){return {new:'b-new',accepted:'b-active',porter_coming:'b-active',picked_up:'b-active',delivered:'b-done',rejected:'b-rejected',returned:'b-rejected',rto:'b-rejected'}[s]||'b-done';}
function statusLabel(s){return {new:'New',accepted:'Accepted',porter_coming:'Porter coming',picked_up:'Out for delivery',delivered:'Delivered',rejected:'Rejected',returned:'Returned (RTO)',rto:'Return in progress'}[s]||s;}

// ── COD Penalty helpers ──
function getCodFailCount(phone){
  const now=Date.now(); const month=30*24*3600*1000;
  return (codFailures[phone]||[]).filter(f=>now-f.time<month).length;
}
function addCodFail(phone, orderId){
  if(!codFailures[phone]) codFailures[phone]=[];
  codFailures[phone].push({time:Date.now(),orderId});
  persist();
}
function isCodBlocked(phone){return getCodFailCount(phone)>=2;}

function startTimer(id, secs) {
  let s = secs;
  const tick = () => {
    s--;
    const el = document.getElementById('t-'+id);
    if(!el){clearInterval(timers[id]);return;}
    if(s<=0){clearInterval(timers[id]);rejectOrder(id,true,'Auto-cancelled — no response');return;}
    const m=Math.floor(s/60),sec=s%60;
    el.textContent=m+':'+(sec<10?'0':'')+sec;
    if(s<=30)el.style.color='#d32f2f';
    const o=orders.find(x=>x.id===id);if(o)o.timeLeft=s;
  };
  timers[id]=setInterval(tick,1000);
  const el=document.getElementById('t-'+id);
  if(el){const m=Math.floor(s/60),sec=s%60;el.textContent=m+':'+(sec<10?'0':'')+sec;}
}

function acceptOrder(id){
  const o=orders.find(x=>x.id===id);if(!o)return;
  clearInterval(timers[id]);
  o.status='accepted';o.timeLeft=null;
  o.delivery={status:'assigning'};
  persist();refreshBadges();
  toast('✓ Order #'+id+' accepted! Finding nearest delivery partner...');
  curOrderTab='active';renderOrders();
  // simulate API call delay
  setTimeout(()=>assignDelivery(id), 2500);
}

const porterDrivers=[
  {name:'Rahul Kumar',phone:'9876501111',vehicle:'MH 04 AB 1234',type:'Bike'},
  {name:'Amit Sharma',phone:'9876502222',vehicle:'MP 09 CD 5678',type:'Bike'},
  {name:'Vijay Patel',phone:'9876503333',vehicle:'MH 14 EF 9012',type:'Scooter'},
];
const rapidoDrivers=[
  {name:'Suresh Yadav',phone:'9876504444',vehicle:'MP 09 GH 3456',type:'Bike'},
  {name:'Deepak Singh',phone:'9876505555',vehicle:'MH 04 IJ 7890',type:'Bike'},
];

function assignDelivery(id){
  const o=orders.find(x=>x.id===id);if(!o)return;
  const delSettings=loadData('delivery_settings',{});
  const usePorter = delSettings.porterKey || true;
  const useRapido = delSettings.rapidoKey || true;

  // Simulate pricing
  const porterPrice = 40+Math.floor(Math.random()*40); // ₹40–80
  const porterEta   = 8+Math.floor(Math.random()*8);   // 8–15 mins
  const rapidoPrice = 30+Math.floor(Math.random()*35); // ₹30–65
  const rapidoEta   = 10+Math.floor(Math.random()*10); // 10–20 mins

  // Pick cheaper
  const pickedProvider = (rapidoPrice<=porterPrice&&useRapido) ? 'Rapido' : 'Porter';
  const driver = pickedProvider==='Porter'
    ? porterDrivers[Math.floor(Math.random()*porterDrivers.length)]
    : rapidoDrivers[Math.floor(Math.random()*rapidoDrivers.length)];
  const price = pickedProvider==='Porter'?porterPrice:rapidoPrice;
  const eta   = pickedProvider==='Porter'?porterEta:rapidoEta;
  const trackingId = 'TRK'+Math.floor(100000+Math.random()*900000);

  o.delivery={
    status:'assigned',
    provider:pickedProvider,
    driver:driver.name,
    driverPhone:driver.phone,
    vehicle:driver.vehicle,
    vehicleType:driver.type,
    eta,price,
    trackingId,
    trackingUrl:'https://track.haatke.in/'+trackingId,
    porterQuote:{price:porterPrice,eta:porterEta},
    rapidoQuote:{price:rapidoPrice,eta:rapidoEta},
    assignedAt:Date.now(),
  };
  persist();
  toast('🛵 '+pickedProvider+' assigned — '+driver.name+' arriving in '+eta+' mins (₹'+price+')');
  if(curScreen==='orders') renderOrderList();
  if(curScreen==='delivery') renderDelivery();
}

// ── Reject with reason modal ──
const rejectReasons = ['Out of stock','Item damaged','Shop closing soon','Customer address unclear','Other'];
function showRejectModal(id){
  const modal=document.createElement('div');
  modal.className='modal-bg open';
  modal.innerHTML=`<div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 style="margin:0">Reason for rejection</h3>
      <button onclick="this.closest('.modal-bg').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Select a reason. Customer will be notified.</p>
    ${rejectReasons.map(r=>`
      <button onclick="rejectOrder('${id}',false,'${r}');this.closest('.modal-bg').remove()"
        class="btn btn-ghost" style="width:100%;text-align:left;margin-bottom:8px;justify-content:flex-start">
        ${r}
      </button>`).join('')}
  </div>`;
  document.body.appendChild(modal);
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
}

function rejectOrder(id, auto=false, reason=''){
  const o=orders.find(x=>x.id===id);if(!o||o.status!=='new')return;
  clearInterval(timers[id]);
  o.status='rejected';o.timeLeft=null;o.rejectReason=reason;
  persist();refreshBadges();
  toast(auto?'⏰ #'+id+' auto-cancelled':('Order #'+id+' rejected'+(reason?' — '+reason:'')));
  renderOrders();
}

// ── RTO: Delivery failed ──
function markRTO(id){
  const o=orders.find(x=>x.id===id);if(!o)return;
  if(!confirm('Mark delivery as FAILED?\n\nPorter will return the product to your shop.\nCustomer loses delivery fee. Product refund will be processed.'))return;
  o.status='rto';
  if(o.payment==='COD') addCodFail(o.phone, id);
  persist();
  toast('⚠️ RTO started — porter is returning product to you. Customer notified.');
  renderOrders();
}

function advanceOrder(id, newStatus){
  const o=orders.find(x=>x.id===id);if(!o)return;
  o.status=newStatus;
  if(newStatus==='delivered') o.time=Date.now();
  if(newStatus==='returned'){
    o.time=Date.now();
    curOrderTab='done';
  }
  persist();
  const msgs={
    porter_coming:'Porter marked as arrived — hand over the parcel.',
    picked_up:'Order handed to porter — out for delivery.',
    delivered:'✓ Delivered! ₹'+o.total.toLocaleString()+' will be settled in 24 hours.',
    returned:'Product returned to your shop. RTO complete.'
  };
  toast(msgs[newStatus]||'Order updated.');
  if(newStatus==='delivered') curOrderTab='done';
  renderOrders();
}

        <option value="newest" ${prodSort==='newest'?'selected':''}>Newest first</option>
        <option value="price_asc" ${prodSort==='price_asc'?'selected':''}>Price: Low → High</option>
        <option value="price_desc" ${prodSort==='price_desc'?'selected':''}>Price: High → Low</option>
        <option value="stock_asc" ${prodSort==='stock_asc'?'selected':''}>Stock: Low → High</option>
        <option value="stock_desc" ${prodSort==='stock_desc'?'selected':''}>Stock: High → Low</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="go('add')">➕ Add</button>
    </div>

    <!-- Category tabs -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
      ${cats.map(cat=>`<button class="btn btn-sm ${prodCategory===cat?'btn-primary':'btn-ghost'}"
        onclick="prodCategory='${cat}';renderProdGrid()">${cat==='all'?'All ('+products.length+')':cat}</button>`).join('')}
    </div>

    <div style="font-size:13px;color:var(--muted);margin-bottom:12px" id="prod-count-line"></div>
    <div class="prod-grid" id="prod-grid"></div>
  `;
  renderProdGrid();
}

function renderProdGrid(){
  const g=document.getElementById('prod-grid');if(!g)return;

  // Filter
  let list = products.filter(p=>{
    const matchSearch = !prodSearch || p.name.toLowerCase().includes(prodSearch.toLowerCase());
    const matchCat = prodCategory==='all' || (p.category||'Other')===prodCategory;
    return matchSearch && matchCat;
  });

  // Sort
  if(prodSort==='price_asc') list=[...list].sort((a,b)=>a.price-b.price);
  else if(prodSort==='price_desc') list=[...list].sort((a,b)=>b.price-a.price);
  else if(prodSort==='stock_asc') list=[...list].sort((a,b)=>a.stock-b.stock);
  else if(prodSort==='stock_desc') list=[...list].sort((a,b)=>b.stock-a.stock);
  // newest = default insertion order (reverse)
  else list=[...list].reverse();

  const cl=document.getElementById('prod-count-line');
  if(cl) cl.textContent=`${list.length} product${list.length!==1?'s':''} · ${products.filter(p=>p.active).length} live · ${products.filter(p=>p.stock===0).length} out of stock`;

  const lowThresh = (p) => p.stock > 0 && p.stock <= (p.lowStock||3);

  g.innerHTML=(list.length?list.map(p=>`
    <div class="prod-card" style="${!p.active?'opacity:.7':''}">
      <div class="prod-img" style="background:${p.active?'#FFF5F5':'#f5f5f5'};overflow:hidden;padding:0;position:relative">
        ${p.photos&&p.photos[0]
          ? `<img src="${p.photos[0]}" style="width:100%;height:100%;object-fit:cover">`
          : `<span style="font-size:44px">${p.emoji||'📦'}</span>`}
        ${p.stock===0?'<span class="oos-badge">OUT OF STOCK</span>':''}
        ${lowThresh(p)?`<span style="position:absolute;top:5px;left:5px;background:var(--amber);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px">LOW STOCK</span>`:''}
        ${p.photos&&p.photos.length>1?`<span style="position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px">+${p.photos.length-1}</span>`:''}
        ${p.video?`<span style="position:absolute;bottom:5px;left:5px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px">🎥</span>`:''}
      </div>
      <div class="prod-info">
        <div class="prod-name" title="${p.name}">${p.name}</div>
        <div class="prod-price">₹${Number(p.price).toLocaleString()}${p.orig&&p.orig>p.price?` <span style="font-size:11px;color:var(--muted);text-decoration:line-through">₹${Number(p.orig).toLocaleString()}</span>`:''}
        </div>
        <div class="prod-stock" style="color:${p.stock===0?'var(--red)':lowThresh(p)?'var(--amber)':'var(--muted)'}">
          Stock: ${p.stock}${p.sizes&&p.sizes!=='—'?' · '+p.sizes:''}
        </div>
      </div>
      <div class="prod-foot">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">
          <div class="tog ${p.active?'on':''}" onclick="toggleProd(${p.id})"></div>
          <span>${p.active?'Live':'Off'}</span>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" onclick="openEdit(${p.id})">✏️</button>
          <button class="btn btn-ghost btn-sm" onclick="duplicateProd(${p.id})" title="Duplicate">⧉</button>
          <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:none" onclick="deleteProd(${p.id})">🗑️</button>
        </div>
      </div>
    </div>
  `).join(''):`<div class="empty" style="grid-column:1/-1"><div class="ei">🔍</div><p>No products match</p></div>`)+`
    <div class="add-placeholder" onclick="go('add')">
      <div style="font-size:36px">➕</div>
      <span style="font-size:14px;font-weight:500">Add new product</span>
    </div>
  `;
}

function toggleProd(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  p.active=!p.active;
  persist();
  toast(p.active?`✓ "${p.name}" is now live`:`"${p.name}" turned off`);
  renderProdGrid();
}

function deleteProd(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  if(!confirm(`Delete "${p.name}"? This cannot be undone.`))return;
  products=products.filter(x=>x.id!==id);
  persist();
  toast(`"${p.name}" deleted.`);
  renderProdGrid();
}

function openEdit(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  editId=id;
  editPhotos=[...(p.photos||[])];
  document.getElementById('e-name').value=p.name;
  document.getElementById('e-price').value=p.price;
  document.getElementById('e-orig').value=p.orig||p.price;
  document.getElementById('e-stock').value=p.stock;
  document.getElementById('e-lowstock').value=p.lowStock||3;
  document.getElementById('e-sizes').value=p.sizes||'';
  document.getElementById('e-cat').value=p.category||'Other';
  document.getElementById('e-desc').value=p.desc||'';
  renderEditPhotos();
  document.getElementById('edit-modal').classList.add('open');
}

function renderEditPhotos(){
  const g=document.getElementById('e-photo-grid');if(!g)return;
  g.innerHTML=editPhotos.map((src,i)=>`
    <div style="position:relative;width:64px;height:64px;flex-shrink:0">
      <img src="${src}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:2px solid ${i===0?'var(--red)':'var(--border)'}">
      ${i===0?`<div style="position:absolute;bottom:2px;left:2px;background:var(--red);color:#fff;font-size:8px;padding:1px 4px;border-radius:3px">Main</div>`:''}
      <button onclick="removeEditPhoto(${i})" style="position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:#d32f2f;color:#fff;border:none;font-size:10px;cursor:pointer">✕</button>
    </div>`).join('');
}

function addEditPhoto(input){
  const file=input.files[0];if(!file)return;
  if(editPhotos.length>=5){toast('Maximum 5 photos.');return;}
  const r=new FileReader();
  r.onload=e=>{editPhotos.push(e.target.result);renderEditPhotos();toast('📷 Photo added!');};
  r.readAsDataURL(file);
}

function removeEditPhoto(i){
  editPhotos.splice(i,1);
  renderEditPhotos();
}

function saveEdit(){
  const p=products.find(x=>x.id===editId);if(!p)return;
  p.name=document.getElementById('e-name').value.trim()||p.name;
  p.price=parseInt(document.getElementById('e-price').value)||p.price;
  p.orig=parseInt(document.getElementById('e-orig').value)||p.orig;
  p.stock=parseInt(document.getElementById('e-stock').value)||0;
  p.lowStock=parseInt(document.getElementById('e-lowstock').value)||3;
  p.sizes=document.getElementById('e-sizes').value.trim();
  p.category=document.getElementById('e-cat').value;
  p.desc=document.getElementById('e-desc').value.trim();
  if(editPhotos.length) p.photos=editPhotos;
  persist();
  closeModal();
  toast(`✓ "${p.name}" updated.`);
  if(curScreen==='products')renderProducts();
}

function closeModal(){document.getElementById('edit-modal').classList.remove('open');editId=null;editPhotos=[];}

function duplicateProd(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const copy={...p, id:Date.now(), name:p.name+' (Copy)', active:false};
  products.unshift(copy);
  persist();
  toast(`⧉ "${p.name}" duplicated — edit and activate when ready.`);
  renderProducts();
}

// ── Barcode scanner ──
function handleBarcode(input){
  const file=input.files[0];if(!file)return;
  toast('🔍 Reading barcode...');
  if('BarcodeDetector' in window){
    const img=new Image();
    img.onload=()=>{
      const bd=new BarcodeDetector({formats:['ean_13','ean_8','qr_code','code_128','code_39']});
      bd.detect(img).then(barcodes=>{
        if(barcodes.length){
          const code=barcodes[0].rawValue;
          fillFromBarcode(code);
        } else {
          toast('⚠️ No barcode found. Try again with better lighting.');
        }
      }).catch(()=>toast('Could not read barcode.'));
    };
    img.src=URL.createObjectURL(file);
  } else {
    // Fallback simulation
    setTimeout(()=>fillFromBarcode('SIM'+Math.floor(Math.random()*9000000)),1200);
  }
}

let _camStream = null;
let _camMode = 'main'; // 'main' | 'extra'
let _camFacing = 'environment'; // rear camera default

function openCamera(mode){
  _camMode = mode || 'main';
  _camFacing = 'environment';
  const modal = document.getElementById('camera-modal');
  modal.classList.add('open');
  startCameraStream();
}

function startCameraStream(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    // No getUserMedia support — fall back to file input
    closeCameraModal();
    const inp = _camMode==='main'?'cam-input':'cam-extra';
    document.getElementById(inp)?.click();
    return;
  }
  // Stop any existing stream
  if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; }
  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ ideal:_camFacing }, width:{ideal:1920}, height:{ideal:1080} },
    audio:false
  }).then(stream=>{
    _camStream=stream;
    const v=document.getElementById('cam-preview');
    if(v){ v.srcObject=stream; v.style.display='block'; }
    const ns=document.getElementById('cam-no-support');
    if(ns) ns.style.display='none';
  }).catch(err=>{
    console.warn('Camera error:',err);
    // Permission denied or no camera — fall back to file input
    closeCameraModal();
    const inp = _camMode==='main'?'cam-input':'cam-extra';
    document.getElementById(inp)?.click();
  });
}

function flipCamera(){
  _camFacing = _camFacing==='environment'?'user':'environment';
  startCameraStream();
}

function capturePhoto(){
  const v=document.getElementById('cam-preview');
  if(!v||!v.srcObject){ closeCameraModal(); return; }
  const canvas=document.createElement('canvas');
  canvas.width=v.videoWidth||640;
  canvas.height=v.videoHeight||480;
  canvas.getContext('2d').drawImage(v,0,0);
  const dataUrl=canvas.toDataURL('image/jpeg',0.92);
  closeCameraModal();
  // Process like handlePhoto
  if(productPhotos.length>=5){ toast('Maximum 5 photos allowed.'); return; }
  productPhotos.push(dataUrl);
  document.getElementById('photo-area').style.display='none';
  document.getElementById('photo-thumbs').style.display='block';
  renderThumbs();
  if(_camMode==='main') runAI();
  else toast('📷 Photo '+(productPhotos.length)+' added!');
}

function closeCameraModal(){
  if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; }
  const v=document.getElementById('cam-preview');
  if(v) v.srcObject=null;
  document.getElementById('camera-modal')?.classList.remove('open');
}

function handlePhoto(input, isFirst){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    if(productPhotos.length>=5){toast('Maximum 5 photos allowed.');return;}
    productPhotos.push(e.target.result);
    document.getElementById('photo-area').style.display='none';
    document.getElementById('photo-thumbs').style.display='block';
    renderThumbs();
    if(isFirst) runAI();
    else toast('📷 Photo '+(productPhotos.length)+' added!');
  };
  reader.readAsDataURL(file);
}

function runAI(){
  document.getElementById('ai-prog-wrap').style.display='block';
  const removebgKey=loadData('removebg_key','');
  let i=0;
  const run=()=>{
    if(i>=aiSteps.length){
      setTimeout(()=>{
        document.getElementById('ai-prog-wrap').style.display='none';
        document.getElementById('add-form').style.display='block';
        document.getElementById('manual-entry-btn').style.display='none';
        const sample=aiSamples[Math.floor(Math.random()*aiSamples.length)];
        document.getElementById('a-name').value=sample.name;
        document.getElementById('a-cat').value=sample.cat;
        document.getElementById('a-emoji').value=sample.emoji;
        document.getElementById('a-price').value=sample.price;
        document.getElementById('a-orig').value=sample.orig;
        document.getElementById('a-desc').value=sample.desc;
        aiDone=true;
        toast(removebgKey?'✨ Real AI: background removed + details filled!':'✨ Details filled! Add your real price and sizes.');
      },400);
      return;
    }
    document.getElementById('ai-bar').style.width=aiSteps[i][0]+'%';
    document.getElementById('ai-step').textContent=(i===0&&removebgKey?'🤖 Real AI: Removing background...':aiSteps[i][1]);
    i++;
    setTimeout(run,600);
  };
  run();
}

// ── Background Removal (free client-side AI + optional remove.bg API) ──
let _bgRemoveModule = null; // cached after first load

async function removeBackgroundAI(idx){
  idx = (idx === undefined) ? 0 : idx;
  const src = productPhotos[idx];
  if(!src){ toast('📷 Take a photo first.'); return; }

  // Dim the thumb while processing
  const thumbEl = document.getElementById('thumb-grid')?.children[idx];
  if(thumbEl) thumbEl.style.opacity = '0.4';

  const removebgKey = loadData('removebg_key','');
  let resultBase64;
  try {
    if(removebgKey){
      // ── remove.bg API ──
      toast('🤖 remove.bg: removing background...');
      const blob = await (await fetch(src)).blob();
      const form = new FormData();
      form.append('image_file', blob, 'product.jpg');
      form.append('size', 'auto');
      const res = await fetch('https://api.remove.bg/v1.0/removebg',{
        method:'POST', headers:{'X-Api-Key':removebgKey}, body:form
      });
      if(!res.ok){ toast('❌ remove.bg error: '+res.statusText); if(thumbEl)thumbEl.style.opacity='1'; return; }
      resultBase64 = await _blobToBase64(await res.blob());
    } else {
      // ── Free in-browser AI (@imgly/background-removal) ──
      if(!_bgRemoveModule){
        toast('⏳ Loading AI model… takes ~10–20s the first time (then cached)');
      }
      if(!_bgRemoveModule){
        _bgRemoveModule = await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/web/index.mjs');
      }
      toast('✨ AI is removing the background…');
      const blob = await (await fetch(src)).blob();
      const resultBlob = await _bgRemoveModule.removeBackground(blob, {
        publicPath: 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/web/',
        debug: false,
      });
      resultBase64 = await _blobToBase64(resultBlob);
    }

    // Composite transparent PNG onto white background → JPEG
    productPhotos[idx] = await _compositeOnWhite(resultBase64);
    renderThumbs();
    toast('✅ Background removed! Clean white product photo ready.');
  } catch(err){
    console.error('BG removal failed:', err);
    toast('❌ Background removal failed. Check your internet connection.');
    if(thumbEl) thumbEl.style.opacity = '1';
  }
}

function _blobToBase64(blob){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

function _compositeOnWhite(base64){
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.drawImage(img, 0, 0);
      res(c.toDataURL('image/jpeg', 0.92));
    };
    img.onerror = rej;
    img.src = base64;
  });
}

function submitProduct(){
  const name=document.getElementById('a-name').value.trim();
  const price=parseInt(document.getElementById('a-price').value);
  const stock=parseInt(document.getElementById('a-stock').value);
  if(!name){toast('⚠️ Please enter a product name.');return;}
  if(!price||price<=0){toast('⚠️ Please enter a valid price.');return;}
  if(isNaN(stock)){toast('⚠️ Please enter stock quantity.');return;}

  const custom=document.getElementById('a-custom-size').value.trim();
  const sizes=selSizes.length>0?selSizes.join(', '):custom||'Free size';

  const newP={
    id:Date.now(),name,price,
    orig:parseInt(document.getElementById('a-orig').value)||price,
    stock,sizes,
    category:document.getElementById('a-cat').value,
    active:true,
    emoji:document.getElementById('a-emoji').value||'📦',
    desc:document.getElementById('a-desc').value.trim(),
    photos:productPhotos.slice(),
    video:productVideo||null,
  };
  products.unshift(newP);
  persist();
  toast('🎉 "'+name+'" listed with '+(productPhotos.length||0)+' photo'+(productPhotos.length!==1?'s':'')+'!');
  go('products');
}

function openOrderModal(){
  const sel=document.getElementById('o-prod');
  if(!sel)return;
  sel.innerHTML=products.filter(p=>p.active&&p.stock>0).map(p=>`<option value="${p.id}">${p.name} — ₹${p.price}</option>`).join('');
  if(!sel.options.length){toast('No active products with stock. Add a product first.');return;}
  document.getElementById('order-modal').classList.add('open');
}

function createOrder(){
  const name=document.getElementById('o-name').value.trim()||'Customer';
  const phone=document.getElementById('o-phone').value.trim()||'9999999999';
  const pay=document.getElementById('o-pay').value;
  const prodId=parseInt(document.getElementById('o-prod').value);
  const qty=parseInt(document.getElementById('o-qty').value)||1;
  const p=products.find(x=>x.id===prodId);
  if(!p){toast('Product not found.');return;}
  const orderId='HK-'+Math.floor(1000+Math.random()*9000);
  const notes=document.getElementById('o-notes')?.value.trim()||'';
  const newOrder={
    id:orderId,customer:name,phone,
    items:[{name:p.name+' ('+p.sizes.split(',')[0].trim()+')',price:p.price,qty}],
    total:p.price*qty,payment:pay,status:'new',time:Date.now(),timeLeft:120,
    notes,
  };
  if(!shopOpen){toast('⚠️ Your shop is closed. Open it first before accepting orders.');closeOrderModal();return;}
  orders.push(newOrder);
  p.stock=Math.max(0,p.stock-qty);
  persist();
  closeOrderModal();
  refreshBadges();
  fireNotif('🔔 New order on Haatke!', '#'+orderId+' from '+name+' · ₹'+newOrder.total);
  toast('🔔 New order #'+orderId+' from '+name+'! Go to Orders to accept.');
  if(curScreen==='dashboard')renderDashboard();
  if(curScreen==='orders')renderOrders();
}

function closeOrderModal(){document.getElementById('order-modal').classList.remove('open');}

    <div style="background:#f5f5f5;border-radius:8px;padding:12px;font-size:13px;color:var(--muted);text-align:center">
      Haatke automatically picked <strong style="color:var(--text)">${d.provider}</strong> — saved you <strong style="color:var(--green)">₹${Math.abs(d.porterQuote.price-d.rapidoQuote.price)}</strong> vs the other option
    </div>
  </div>`;
  document.body.appendChild(modal);
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
}

// EARNINGS
// ══════════════════════════════════════════════════
let earnView='week'; // week | month | year

function renderEarnings(){
  const delivered=orders.filter(o=>o.status==='delivered');
  const now=new Date();

  // Period filter
  const periodStart=(()=>{
    const d=new Date();
    if(earnView==='week'){d.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1));d.setHours(0,0,0,0);}
    else if(earnView==='month'){d.setDate(1);d.setHours(0,0,0,0);}
    else{d.setMonth(0,1);d.setHours(0,0,0,0);}
    return d.getTime();
  })();
  const periodOrders=delivered.filter(o=>o.time>=periodStart);
  const allGross=delivered.reduce((s,o)=>s+o.total,0);
  const periodGross=periodOrders.reduce((s,o)=>s+o.total,0);
  const commission=Math.round(allGross*0.05);
  const net=allGross-commission;
  const pendingWithdraw=withdrawals.filter(w=>w.status==='pending').reduce((s,w)=>s+w.amount,0);
  const settled=withdrawals.filter(w=>w.status==='settled').reduce((s,w)=>s+w.amount,0);
  const availableBalance=Math.max(0,net-settled-pendingWithdraw);

  // Bar chart
  let bars=[];
  if(earnView==='week'){
    const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const dow=now.getDay();
    bars=days.map((lbl,i)=>{
      const d=new Date();d.setDate(d.getDate()-(dow===0?6:dow-1)+i);d.setHours(0,0,0,0);
      const next=new Date(d);next.setDate(next.getDate()+1);
      const val=delivered.filter(o=>o.time>=d.getTime()&&o.time<next.getTime()).reduce((s,o)=>s+o.total,0);
      const isToday=i===(dow===0?6:dow-1);
      return{lbl,val,isToday};
    });
  } else if(earnView==='month'){
    // Last 4 weeks
    for(let w=3;w>=0;w--){
      const start=new Date();start.setDate(start.getDate()-w*7-6);start.setHours(0,0,0,0);
      const end=new Date();end.setDate(end.getDate()-w*7+1);end.setHours(0,0,0,0);
      const val=delivered.filter(o=>o.time>=start.getTime()&&o.time<end.getTime()).reduce((s,o)=>s+o.total,0);
      bars.push({lbl:'Wk '+(4-w),val,isToday:w===0});
    }
  } else {
    // 12 months
    const mNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    bars=mNames.map((lbl,i)=>{
      const start=new Date(now.getFullYear(),i,1);
      const end=new Date(now.getFullYear(),i+1,1);
      const val=delivered.filter(o=>o.time>=start.getTime()&&o.time<end.getTime()).reduce((s,o)=>s+o.total,0);
      return{lbl,val,isToday:i===now.getMonth()};
    });
  }
  const maxBar=Math.max(...bars.map(b=>b.val),1);

  const c=document.getElementById('content');
  c.innerHTML=`
    <!-- Period tabs -->
    <div style="display:flex;gap:8px;margin-bottom:18px">
      ${['week','month','year'].map(v=>`<button class="btn btn-sm ${earnView===v?'btn-primary':'btn-ghost'}" onclick="earnView='${v}';renderEarnings()">${v.charAt(0).toUpperCase()+v.slice(1)}</button>`).join('')}
    </div>

    <!-- Balance card -->
    <div style="background:linear-gradient(135deg,var(--red),#8B0000);color:#fff;border-radius:14px;padding:22px;margin-bottom:18px">
      <div style="font-size:12px;opacity:.8;font-weight:500;text-transform:uppercase;letter-spacing:.5px">Available to withdraw</div>
      <div style="font-size:36px;font-weight:900;margin:6px 0">₹${availableBalance.toLocaleString()}</div>
      <div style="display:flex;gap:16px;font-size:12px;opacity:.85;margin-bottom:16px">
        <span>Total: ₹${allGross.toLocaleString()}</span>
        <span>Fee: −₹${commission.toLocaleString()}</span>
        <span>Withdrawn: −₹${settled.toLocaleString()}</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${availableBalance>=100
          ?`<button class="btn btn-sm" style="background:#fff;color:var(--red);font-weight:700;border:none" onclick="showWithdrawModal()">💸 Withdraw money</button>`
          :`<span style="font-size:12px;opacity:.7">Minimum ₹100 needed to withdraw</span>`}
        ${pendingWithdraw>0?`<span style="background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;font-size:12px">₹${pendingWithdraw.toLocaleString()} pending</span>`:''}
      </div>
    </div>

    <div class="earn-grid">
      <div>
        <!-- Summary stats -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          <div class="stat-card"><div class="stat-label">This ${earnView}</div><div class="stat-value" style="color:var(--green)">₹${periodGross.toLocaleString()}</div><div class="stat-sub">${periodOrders.length} orders</div></div>
          <div class="stat-card"><div class="stat-label">COD orders</div><div class="stat-value">${delivered.filter(o=>o.payment==='COD').length}</div><div class="stat-sub">vs ${delivered.filter(o=>o.payment!=='COD').length} prepaid</div></div>
        </div>

        <!-- Chart -->
        <div class="card" style="margin-bottom:16px">
          <div style="font-size:15px;font-weight:700;margin-bottom:16px">Earnings — this ${earnView}</div>
          <div class="bars">
            ${bars.map(b=>`
              <div class="bar-w">
                <div class="bar-v" style="font-size:10px">${b.val>0?(b.val>=1000?'₹'+(b.val/1000).toFixed(1)+'k':'₹'+b.val):''}</div>
                <div class="bar-f" style="height:${Math.max(4,Math.round((b.val/maxBar)*100))}%;background:${b.isToday?'var(--red)':b.val>0?'var(--red-mid)':'#eee'}"></div>
                <div class="bar-lbl" style="font-size:9px">${b.lbl}</div>
              </div>`).join('')}
          </div>
        </div>

        <!-- Order history -->
        <div class="card">
          <div style="font-size:15px;font-weight:700;margin-bottom:14px">Transaction history</div>
          <!-- Withdrawals -->
          ${withdrawals.slice().reverse().map(w=>`
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #fafafa;font-size:13px">
              <div><div style="font-weight:500;color:var(--red)">💸 Withdrawal request</div><div style="font-size:11px;color:var(--muted)">${new Date(w.time).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div></div>
              <div style="text-align:right"><div style="color:var(--red);font-weight:600">−₹${w.amount.toLocaleString()}</div><div style="font-size:11px;color:${w.status==='settled'?'var(--green)':'var(--amber)'}">${w.status==='settled'?'✓ Settled':'⏳ Pending'}</div></div>
            </div>`).join('')}
          <!-- Sales -->
          ${delivered.length?delivered.slice().reverse().map(o=>`
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #fafafa;font-size:13px">
              <div><div style="font-weight:500">#${o.id} — ${o.customer}</div><div style="font-size:11px;color:var(--muted)">${new Date(o.time).toLocaleDateString('en-IN',{day:'numeric',month:'short'})} · ${o.payment}</div></div>
              <div style="text-align:right"><div style="color:var(--green);font-weight:600">+₹${o.total.toLocaleString()}</div></div>
            </div>`).join(''):
          '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No orders yet</div>'}
          <button class="btn btn-ghost" style="width:100%;margin-top:12px" onclick="printEarnings()">🖨️ Download / print statement</button>
        </div>
      </div>

      <div>
        <!-- Payout info -->
        <div class="card" style="margin-bottom:14px">
          <div style="font-size:14px;font-weight:700;margin-bottom:10px">Payout account</div>
          ${shop.upi?`<div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:4px">✓ ${shop.upi}</div>`:'<div style="font-size:13px;color:var(--red)">⚠️ UPI not set</div>'}
          ${shop.bankAccount?`<div style="font-size:12px;color:var(--muted);margin-top:4px">Bank: ••••${shop.bankAccount.slice(-4)} · ${shop.bankName||''}</div>`:''}
          <button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="go('profile')">Update payout details</button>
        </div>

        <!-- Withdrawal history -->
        <div class="card" style="margin-bottom:14px">
          <div style="font-size:14px;font-weight:700;margin-bottom:10px">Withdrawal requests</div>
          ${withdrawals.length?withdrawals.slice().reverse().slice(0,5).map(w=>`
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #fafafa;font-size:12px">
              <span>₹${w.amount.toLocaleString()}</span>
              <span style="color:${w.status==='settled'?'var(--green)':'var(--amber)'}">${w.status==='settled'?'✓ Settled':'⏳ Pending'}</span>
            </div>`).join('')
          :'<div style="font-size:12px;color:var(--muted)">No withdrawals yet</div>'}
        </div>

        <!-- Breakdown -->
        <div class="card">
          <div style="font-size:14px;font-weight:700;margin-bottom:12px">How earnings work</div>
          <div class="p-row"><span>Total sales</span><span>₹${allGross.toLocaleString()}</span></div>
          <div class="p-row"><span>Platform fee (5%)</span><span style="color:var(--red)">−₹${commission.toLocaleString()}</span></div>
          <div class="p-row" style="border-top:2px solid var(--border);margin-top:6px;padding-top:8px;font-weight:600"><span>Net earnings</span><span style="color:var(--green)">₹${net.toLocaleString()}</span></div>
          <div class="p-row"><span>Withdrawn</span><span style="color:var(--muted)">−₹${settled.toLocaleString()}</span></div>
          <div class="p-row"><span>Pending withdrawal</span><span style="color:var(--amber)">−₹${pendingWithdraw.toLocaleString()}</span></div>
          <div class="p-row" style="font-weight:700"><span>Available now</span><span style="color:var(--green)">₹${availableBalance.toLocaleString()}</span></div>
        </div>
      </div>
    </div>

    <!-- Withdraw modal -->
    <div class="modal-bg" id="withdraw-modal">
      <div class="modal">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <h3 style="margin:0">💸 Withdraw money</h3>
          <button onclick="document.getElementById('withdraw-modal').classList.remove('open')" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button>
        </div>
        <div style="background:var(--green-bg);border-radius:8px;padding:12px;margin-bottom:14px;font-size:13px;color:var(--green)">
          Available balance: <strong>₹${availableBalance.toLocaleString()}</strong>
        </div>
        <div class="fg"><label class="fl">Amount to withdraw (₹)</label>
          <input class="fi" id="withdraw-amount" type="number" max="${availableBalance}" placeholder="Enter amount (min ₹100)">
        </div>
        <div class="fg"><label class="fl">Send to</label>
          <select class="fs" id="withdraw-to">
            ${shop.upi?`<option value="upi">UPI — ${shop.upi}</option>`:''}
            ${shop.bankAccount?`<option value="bank">Bank — ••••${shop.bankAccount.slice(-4)}</option>`:''}
            ${!shop.upi&&!shop.bankAccount?`<option value="">No payout method set</option>`:''}
          </select>
        </div>
        ${!shop.upi&&!shop.bankAccount?`<div style="font-size:12px;color:var(--red);margin-bottom:10px">⚠️ Please set UPI or bank account in My Shop first</div>`:''}
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" style="flex:1" onclick="submitWithdraw()">Request withdrawal</button>
          <button class="btn btn-ghost" onclick="document.getElementById('withdraw-modal').classList.remove('open')">Cancel</button>
        </div>
      </div>
    </div>
  `;
}

function showWithdrawModal(){document.getElementById('withdraw-modal')?.classList.add('open');}

function submitWithdraw(){
  const amount=parseInt(document.getElementById('withdraw-amount')?.value)||0;
  const to=document.getElementById('withdraw-to')?.value;
  if(!to){toast('Please set a payout method in My Shop first.');return;}
  if(amount<100){toast('Minimum withdrawal amount is ₹100.');return;}
  const delivered=orders.filter(o=>o.status==='delivered');
  const net=delivered.reduce((s,o)=>s+o.total,0)-Math.round(delivered.reduce((s,o)=>s+o.total,0)*0.05);
  const settled=withdrawals.filter(w=>w.status==='settled').reduce((s,w)=>s+w.amount,0);
  const pending=withdrawals.filter(w=>w.status==='pending').reduce((s,w)=>s+w.amount,0);
  const available=Math.max(0,net-settled-pending);
  if(amount>available){toast('Amount exceeds available balance of ₹'+available);return;}
  withdrawals.push({id:Date.now(),amount,to,status:'pending',time:Date.now()});
  persist();
  document.getElementById('withdraw-modal')?.classList.remove('open');
  toast('✓ Withdrawal of ₹'+amount.toLocaleString()+' requested! Usually settled in 1–2 business days.');
  renderEarnings();
}

function printEarnings(){
  const delivered=orders.filter(o=>o.status==='delivered');
  const totalGross=delivered.reduce((s,o)=>s+o.total,0);
  const commission=Math.round(totalGross*0.05);
  const net=totalGross-commission;
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Earnings Statement — ${shop.name||'My Shop'}</title>
  <style>body{font-family:Arial,sans-serif;padding:24px;color:#222}h2{color:#C62828}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{padding:10px 12px;border:1px solid #ddd;text-align:left}th{background:#f5f5f5}tfoot td{font-weight:bold;background:#FFEBEE}</style></head>
  <body><h2>${shop.name||'My Shop'} — Earnings Statement</h2>
  <p>Generated: ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</p>
  <table><thead><tr><th>#Order</th><th>Customer</th><th>Date</th><th>Payment</th><th>Amount</th></tr></thead>
  <tbody>${delivered.map(o=>`<tr><td>#${o.id}</td><td>${o.customer}</td><td>${new Date(o.time).toLocaleDateString('en-IN')}</td><td>${o.payment}</td><td>₹${o.total.toLocaleString()}</td></tr>`).join('')}</tbody>
  <tfoot><tr><td colspan="4">Total (Platform fee 5% = ₹${commission.toLocaleString()} deducted)</td><td>₹${net.toLocaleString()}</td></tr></tfoot>
  </table></body></html>`);
  w.document.close();w.print();
}

// OFFERS & COUPONS
// ══════════════════════════════════════════════════
function renderOffers(){
  const now=Date.now();
  const active=coupons.filter(c=>c.active&&(!c.expiry||new Date(c.expiry).getTime()>now));
  const expired=coupons.filter(c=>!c.active||(c.expiry&&new Date(c.expiry).getTime()<=now));
  const flashSale=loadData('flash_sale',{on:false,discount:0,until:''});
  const c=document.getElementById('content');
  c.innerHTML=`
    <!-- Flash sale banner -->
    <div class="card" style="margin-bottom:16px;${flashSale.on?'border:2px solid var(--red)':''}">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:28px">⚡</span>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700">Flash Sale</div>
          <div style="font-size:12px;color:var(--muted)">Apply a % discount on ALL products for a limited time</div>
        </div>
        <div class="tog ${flashSale.on?'on':''}" onclick="toggleFlashSale()"></div>
      </div>
      ${flashSale.on?`
        <div style="background:var(--red-light);border-radius:8px;padding:10px 13px;margin-top:10px">
          <div style="font-size:13px;font-weight:600;color:var(--red)">⚡ Flash Sale is LIVE — ${flashSale.discount}% off everything</div>
          ${flashSale.until?`<div style="font-size:12px;color:#888;margin-top:2px">Ends: ${new Date(flashSale.until).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>`:''}
        </div>
        <button class="btn btn-danger btn-sm" style="margin-top:10px" onclick="toggleFlashSale()">End flash sale</button>
      `:`
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
          <div class="fg" style="margin:0;flex:1">
            <input class="fi" id="flash-pct" type="number" placeholder="Discount %" min="5" max="90" style="font-size:13px">
          </div>
          <div class="fg" style="margin:0;flex:1">
            <input class="fi" id="flash-until" type="datetime-local" style="font-size:13px">
          </div>
          <button class="btn btn-primary btn-sm" onclick="startFlashSale()">⚡ Start flash sale</button>
        </div>`}
    </div>

    <!-- Create coupon -->
    <div class="card" style="margin-bottom:16px">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px">🏷️ Create coupon code</div>
      <div class="form-row">
        <div class="fg"><label class="fl">Coupon code</label><input class="fi" id="c-code" placeholder="e.g. HAATKE10" style="text-transform:uppercase"></div>
        <div class="fg"><label class="fl">Type</label>
          <select class="fs" id="c-type">
            <option value="percent">% Discount</option>
            <option value="fixed">Fixed amount (₹)</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="fg"><label class="fl">Discount value</label><input class="fi" id="c-value" type="number" placeholder="e.g. 10 for 10% or ₹50"></div>
        <div class="fg"><label class="fl">Min order amount (₹)</label><input class="fi" id="c-min" type="number" placeholder="e.g. 200 (optional)"></div>
      </div>
      <div class="form-row">
        <div class="fg"><label class="fl">Max uses (blank = unlimited)</label><input class="fi" id="c-maxuses" type="number" placeholder="e.g. 50"></div>
        <div class="fg"><label class="fl">Expiry date (optional)</label><input class="fi" id="c-expiry" type="date"></div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="createCoupon()">Create coupon</button>
    </div>

    <!-- Active coupons -->
    <div style="font-size:15px;font-weight:700;margin-bottom:12px">Active coupons (${active.length})</div>
    ${active.length?active.map(cp=>`
      <div class="card card-sm" style="margin-bottom:10px;border-left:3px solid var(--green)">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="background:var(--green-bg);border:1.5px dashed var(--green);border-radius:6px;padding:6px 12px;font-size:16px;font-weight:800;color:var(--green);letter-spacing:1px;font-family:monospace">${cp.code}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600">${cp.type==='percent'?cp.value+'% off':'₹'+cp.value+' off'}${cp.minOrder?` · Min ₹${cp.minOrder}`:''}</div>
            <div style="font-size:11px;color:var(--muted)">Used ${cp.uses||0}${cp.maxUses?' / '+cp.maxUses:''} times${cp.expiry?' · Expires '+new Date(cp.expiry).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):''}  </div>

}

function createCoupon(){
  const code=document.getElementById('c-code').value.trim().toUpperCase();
  const type=document.getElementById('c-type').value;
  const value=parseInt(document.getElementById('c-value').value)||0;
  const minOrder=parseInt(document.getElementById('c-min').value)||0;
  const maxUses=parseInt(document.getElementById('c-maxuses').value)||null;
  const expiry=document.getElementById('c-expiry').value;
  if(!code){toast('Enter a coupon code.');return;}
  if(!value){toast('Enter a discount value.');return;}
  if(coupons.find(c=>c.code===code&&c.active)){toast('This code already exists!');return;}
  coupons.push({id:'CP'+Date.now(),code,type,value,minOrder,maxUses,expiry,uses:0,active:true,createdAt:Date.now()});
  persist();
  toast('✓ Coupon '+code+' created!');
  renderOffers();
}

function deactivateCoupon(id){coupons=coupons.map(c=>c.id===id?{...c,active:false}:c);persist();toast('Coupon deactivated.');renderOffers();}
function deleteCoupon(id){coupons=coupons.filter(c=>c.id!==id);persist();toast('Coupon deleted.');renderOffers();}

function toggleFlashSale(){
  const fs=loadData('flash_sale',{on:false,discount:0,until:''});
  if(fs.on){saveData('flash_sale',{on:false,discount:0,until:''});toast('Flash sale ended.');renderOffers();return;}
  const pct=parseInt(document.getElementById('flash-pct')?.value)||0;
  const until=document.getElementById('flash-until')?.value||'';
  if(!pct||pct<1||pct>90){toast('Enter a valid discount % (1–90).');return;}
  saveData('flash_sale',{on:true,discount:pct,until});
  toast('⚡ Flash sale started — '+pct+'% off all products!');
  renderOffers();
}

function startFlashSale(){toggleFlashSale();}

// ANALYTICS
// ══════════════════════════════════════════════════
function renderAnalytics(){
  const delivered=orders.filter(o=>o.status==='delivered');
  const allOrders=orders.filter(o=>o.status!=='new');
  const c=document.getElementById('content');

  // Best products
  const prodSales={};
  delivered.forEach(o=>o.items.forEach(it=>{
    const k=it.name.split(' (')[0];
    if(!prodSales[k]) prodSales[k]={units:0,revenue:0};
    prodSales[k].units+=it.qty;
    prodSales[k].revenue+=it.qty*(it.price||0);
  }));
  const bestProds=Object.entries(prodSales).sort((a,b)=>b[1].units-a[1].units).slice(0,5);

  // Peak hours
  const hourCounts=Array(24).fill(0);
  orders.forEach(o=>hourCounts[new Date(o.time).getHours()]++);
  const peakHour=hourCounts.indexOf(Math.max(...hourCounts));
  const maxHour=Math.max(...hourCounts,1);

  // Customer repeat
  const custCount={};
  delivered.forEach(o=>{custCount[o.phone]=(custCount[o.phone]||0)+1;});
  const repeatCustomers=Object.values(custCount).filter(n=>n>1).length;
  const totalCust=Object.keys(custCount).length;

  // Payment split
  const cod=delivered.filter(o=>o.payment==='COD').length;
  const prepaid=delivered.filter(o=>o.payment!=='COD').length;

  // Monthly trend (last 6 months)
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const start=new Date(d.getFullYear(),d.getMonth(),1).getTime();
    const end=new Date(d.getFullYear(),d.getMonth()+1,1).getTime();
    const rev=delivered.filter(o=>o.time>=start&&o.time<end).reduce((s,o)=>s+o.total,0);
    const cnt=delivered.filter(o=>o.time>=start&&o.time<end).length;
    months.push({lbl:d.toLocaleDateString('en-IN',{month:'short'}),rev,cnt});
  }
  const maxMonthRev=Math.max(...months.map(m=>m.rev),1);

  c.innerHTML=`
    <!-- KPI row -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">Fulfillment rate</div><div class="stat-value" style="color:${(allOrders.length?Math.round(delivered.length/allOrders.length*100):100)>=80?'var(--green)':'var(--red)'}">${allOrders.length?Math.round(delivered.length/allOrders.length*100):100}%</div></div>
      <div class="stat-card"><div class="stat-label">Repeat customers</div><div class="stat-value" style="color:var(--green)">${totalCust?Math.round(repeatCustomers/totalCust*100):0}%</div><div class="stat-sub">${repeatCustomers} of ${totalCust}</div></div>
      <div class="stat-card"><div class="stat-label">Avg order value</div><div class="stat-value">₹${delivered.length?Math.round(delivered.reduce((s,o)=>s+o.total,0)/delivered.length).toLocaleString():0}</div></div>
      <div class="stat-card"><div class="stat-label">Peak hour</div><div class="stat-value">${peakHour}:00</div><div class="stat-sub">${hourCounts[peakHour]} orders</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:18px">
      <div>
        <!-- Monthly trend -->
        <div class="card" style="margin-bottom:16px">
          <div style="font-size:15px;font-weight:700;margin-bottom:16px">📈 Revenue — last 6 months</div>
          <div class="bars">
            ${months.map(m=>`
              <div class="bar-w">
                <div class="bar-v" style="font-size:9px">${m.rev>0?(m.rev>=1000?'₹'+(m.rev/1000).toFixed(0)+'k':'₹'+m.rev):''}</div>
                <div class="bar-f" style="height:${Math.max(4,Math.round(m.rev/maxMonthRev*100))}%;background:var(--red)"></div>
                <div class="bar-lbl" style="font-size:10px">${m.lbl}</div>
              </div>`).join('')}
          </div>
        </div>

        <!-- Peak hours heatmap -->
        <div class="card" style="margin-bottom:16px">
          <div style="font-size:15px;font-weight:700;margin-bottom:12px">🕐 When orders come in</div>
          <div style="display:flex;gap:2px;flex-wrap:wrap">
            ${Array.from({length:24},(_,h)=>{
              const pct=Math.round(hourCounts[h]/maxHour*100);
              return `<div title="${h}:00 — ${hourCounts[h]} orders" style="flex:1;min-width:18px;background:${pct>70?'var(--red)':pct>40?'var(--red-mid)':pct>10?'#FFCDD2':'#f5f5f5'};height:40px;border-radius:4px;position:relative">
                <div style="position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--muted)">${h%6===0?h:''}</div>
              </div>`;
            }).join('')}
          </div>
          <div style="margin-top:22px;font-size:12px;color:var(--muted)">Peak: <strong>${peakHour}:00–${peakHour+1}:00</strong> · ${hourCounts[peakHour]} orders</div>
        </div>

        <!-- Order history table -->
        <div class="card">
          <div style="font-size:15px;font-weight:700;margin-bottom:12px">Recent orders</div>
          ${delivered.slice().reverse().slice(0,8).map(o=>`
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #fafafa;font-size:13px">
              <div><span style="font-weight:500">${o.customer}</span> <span style="color:var(--muted);font-size:11px">#${o.id}</span></div>
              <div style="text-align:right"><span style="color:var(--green);font-weight:600">₹${o.total.toLocaleString()}</span> <span style="font-size:10px;color:var(--muted)">${o.payment}</span></div>
            </div>`).join('')}
          ${!delivered.length?'<div style="text-align:center;color:var(--muted);padding:16px">No delivered orders yet</div>':''}
        </div>
      </div>

      <div>
        <!-- Best selling products -->
        <div class="card" style="margin-bottom:16px">
          <div style="font-size:15px;font-weight:700;margin-bottom:12px">🏆 Best sellers</div>
          ${bestProds.length?bestProds.map(([name,s],i)=>`
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #fafafa">
              <span style="font-size:16px;font-weight:800;color:${i===0?'#F57F17':i===1?'#9E9E9E':i===2?'#8D6E63':'var(--muted)'}">#${i+1}</span>
              <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
              <div style="font-size:11px;color:var(--muted)">${s.units} units · ₹${s.revenue.toLocaleString()}</div></div>
            </div>`).join(''):`<div style="text-align:center;color:var(--muted);padding:16px;font-size:13px">No sales data yet</div>`}
        </div>

        <!-- Payment split -->
        <div class="card" style="margin-bottom:16px">
          <div style="font-size:15px;font-weight:700;margin-bottom:12px">💳 Payment split</div>
          ${delivered.length?`
            <div style="display:flex;height:12px;border-radius:6px;overflow:hidden;margin-bottom:10px">
              <div style="flex:${cod};background:var(--amber)"></div>
              <div style="flex:${prepaid};background:var(--green)"></div>
            </div>
            <div style="display:flex;gap:16px;font-size:13px">
              <div><span style="color:var(--amber)">■</span> COD: ${cod} (${Math.round(cod/(cod+prepaid||1)*100)}%)</div>
              <div><span style="color:var(--green)">■</span> Prepaid: ${prepaid} (${Math.round(prepaid/(cod+prepaid||1)*100)}%)</div>
            </div>`:`<div style="color:var(--muted);font-size:13px">No data yet</div>`}
        </div>

        <!-- Customer repeat -->
        <div class="card" style="margin-bottom:16px">
          <div style="font-size:15px;font-weight:700;margin-bottom:12px">👥 Customer loyalty</div>
          <div style="font-size:28px;font-weight:800;color:var(--green)">${totalCust?Math.round(repeatCustomers/totalCust*100):0}%</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:10px">customers ordered more than once</div>
          <div style="display:flex;gap:16px;font-size:12px">
            <div><strong>${totalCust}</strong> total customers</div>
            <div><strong style="color:var(--green)">${repeatCustomers}</strong> repeat</div>
          </div>
        </div>

        <!-- Top customers -->
        <div class="card">
          <div style="font-size:15px;font-weight:700;margin-bottom:12px">⭐ Top customers</div>
          ${Object.entries(custCount).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([phone,cnt],i)=>{
            const cust=delivered.find(o=>o.phone===phone);
            return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #fafafa;font-size:12px">
              <span style="font-weight:700;color:var(--muted)">#${i+1}</span>
              <span style="flex:1;font-weight:500">${cust?.customer||'Customer'}</span>
              <span style="color:var(--green);font-weight:600">${cnt} order${cnt>1?'s':''}</span>
            </div>`;
          }).join('')||'<div style="color:var(--muted);font-size:13px">No data yet</div>'}
        </div>
      </div>
    </div>
  `;
}

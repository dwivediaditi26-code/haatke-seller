// PRESCRIPTIONS
// ══════════════════════════════════════════════════
function renderRx(){
  const pending=prescriptions.filter(r=>r.status==='pending');
  const done=prescriptions.filter(r=>r.status!=='pending');
  const c=document.getElementById('content');
  c.innerHTML=`
    <div style="background:#E8EAF6;border:1px solid #9FA8DA;border-radius:10px;padding:13px 16px;margin-bottom:18px;font-size:13px;color:#283593;display:flex;gap:10px">
      <span style="font-size:18px;flex-shrink:0">💊</span>
      <span>Customers have uploaded prescriptions from their doctor. Check if medicines are in stock and approve or reject. <strong>Only after your approval can they order.</strong></span>
    </div>
    <div style="font-size:15px;font-weight:700;margin-bottom:14px">Waiting for review (${pending.length})</div>
    ${pending.length?pending.map(rx=>`
      <div class="rx-card">
        <div class="rx-head">
          <div>
            <div style="font-size:14px;font-weight:600">${rx.customer} — Rx #${rx.id}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">Phone: ${rx.phone} · Received ${new Date(rx.time).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
          </div>
          <span class="badge b-new">⏳ Pending</span>
        </div>
        <div style="padding:14px 16px">
          <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">Medicines on prescription</div>
          <div id="meds-${rx.id}">
            ${rx.meds.map((m,i)=>`
              <div class="med-row">
                <span style="flex:1">${m}</span>
                <select onchange="setMedStatus('${rx.id}',${i},this.value)" style="padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer">
                  <option value="">Check stock</option>
                  <option value="ok" ${(rx.medStatus&&rx.medStatus[i]==='ok')?'selected':''}>✓ In stock</option>
                  <option value="oos" ${(rx.medStatus&&rx.medStatus[i]==='oos')?'selected':''}>✗ Out of stock</option>
                </select>
              </div>`).join('')}
          </div>
          <div style="background:var(--red-light);border-radius:8px;padding:10px 13px;margin:12px 0;font-size:12px;color:#B71C1C">
            ⚠️ Only approve if prescription is valid and medicines are available. You are responsible for correct dispensing.
          </div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-success" style="flex:1" onclick="approveRx('${rx.id}')">✓ Approve — notify customer</button>
            <button class="btn btn-danger" onclick="rejectRx('${rx.id}')">✗ Reject</button>
          </div>
        </div>
      </div>`).join(''):`<div class="empty"><div class="ei">💊</div><p>No pending prescriptions</p></div>`}
    ${done.length?`
      <div style="font-size:15px;font-weight:700;margin:20px 0 14px">Reviewed (${done.length})</div>
      ${done.map(rx=>`
        <div class="card card-sm" style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div style="flex:1"><div style="font-size:14px;font-weight:500">${rx.customer} · Rx #${rx.id}</div><div style="font-size:12px;color:var(--muted)">${rx.meds.length} medicines</div></div>
          <span class="badge ${rx.status==='approved'?'b-active':'b-rejected'}">${rx.status==='approved'?'✓ Approved':'✗ Rejected'}</span>
        </div>`).join('')}`:''}
  `;
}

function setMedStatus(rxId,idx,val){
  const rx=prescriptions.find(r=>r.id===rxId);
  if(!rx)return;
  if(!rx.medStatus)rx.medStatus={};
  rx.medStatus[idx]=val;
  persist();
}

function approveRx(id){
  const rx=prescriptions.find(r=>r.id===id);if(!rx)return;
  rx.status='approved';persist();refreshBadges();
  toast('✓ Prescription approved! Customer has been notified to place the order.');
  renderRx();
}
function rejectRx(id){
  const rx=prescriptions.find(r=>r.id===id);if(!rx)return;
  rx.status='rejected';persist();refreshBadges();
  toast('Prescription rejected. Customer has been notified.');
  renderRx();
}

        <div class="info-grid" style="margin-bottom:16px">
          <div class="info-card"><div class="info-label">Fulfillment</div><div class="info-value" style="color:${fulfil>=80?'var(--green)':'var(--red)'}">${fulfil}%</div></div>
          <div class="info-card"><div class="info-label">Orders done</div><div class="info-value">${delivered.length}</div></div>
          <div class="info-card"><div class="info-label">Products live</div><div class="info-value">${products.filter(p=>p.active).length}</div></div>
          <div class="info-card"><div class="info-label">Rating</div><div class="info-value" style="color:#F57F17">${avgRating}${reviews.length?'⭐':''}</div></div>
        </div>

        <!-- Verified badge -->
        <div class="card" style="margin-bottom:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <span style="font-size:15px;font-weight:700">✓ Verified seller badge</span>
            ${isVerified?`<span style="background:var(--green-bg);color:var(--green);font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px">Earned!</span>`:`<span style="background:#f5f5f5;color:var(--muted);font-size:11px;padding:3px 9px;border-radius:10px">${verified}/${checks.length}</span>`}
          </div>
          ${checks.map(ch=>`
            <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #fafafa;font-size:13px">
              <span style="color:${ch.ok?'var(--green)':'#ddd'};font-size:16px">${ch.ok?'✓':'○'}</span>
              <span style="color:${ch.ok?'var(--text)':'var(--muted)'}">${ch.label}</span>
              ${!ch.ok?`<span style="margin-left:auto;font-size:11px;color:var(--red)">Missing</span>`:''}
            </div>`).join('')}
          ${isVerified?`<div style="margin-top:10px;text-align:center;font-size:13px;color:var(--green);font-weight:600">🎉 You are a Verified Seller!</div>`:`<div style="margin-top:8px;font-size:12px;color:var(--muted)">Complete all items above to earn Verified badge — boosts customer trust</div>`}
        </div>

        <!-- Holiday mode -->
        <div class="card" style="margin-bottom:16px;${shop.holidayMode?'border:2px solid #d32f2f':''}">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <span style="font-size:22px">🏖️</span>
            <div style="flex:1"><div style="font-size:15px;font-weight:700">Holiday mode</div><div style="font-size:12px;color:var(--muted)">Pause all new orders — use when travelling or on break</div></div>
            <div class="tog ${shop.holidayMode?'on':''}" id="tog-holiday" onclick="toggleHoliday()" style="background:${shop.holidayMode?'#d32f2f':''}"></div>
          </div>
          ${shop.holidayMode?`
            <div style="background:#FFEBEE;border-radius:8px;padding:10px 13px;margin-bottom:10px">
              <div style="font-size:13px;font-weight:600;color:#d32f2f">🔴 Shop paused — no new orders</div>
              <div style="font-size:12px;color:#888;margin-top:3px">Customers see "Shop on holiday" message</div>
            </div>
            <div class="fg"><label class="fl">Returning on (optional)</label><input class="fi" type="date" id="s-holiday-date" value="${shop.holidayUntil||''}"></div>
            <button class="btn btn-primary" style="width:100%" onclick="saveHolidayDate()">Update return date</button>
            <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="toggleHoliday()">Turn off holiday mode</button>
          `:`<button class="btn btn-ghost" style="width:100%" onclick="toggleHoliday()">Enable holiday mode</button>`}
        </div>

        <!-- Reviews -->
        <div class="card" style="margin-bottom:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <span style="font-size:15px;font-weight:700">⭐ Customer reviews</span>
            <span style="font-size:22px;font-weight:800;color:var(--red)">${avgRating}</span>
          </div>
          <div style="display:flex;gap:2px;margin-bottom:10px">
            ${[1,2,3,4,5].map(s=>`<span style="color:${parseFloat(avgRating)>=s?'#F57F17':'#eee'};font-size:18px">★</span>`).join('')}
            <span style="font-size:12px;color:var(--muted);margin-left:6px;margin-top:2px">${reviews.length} total</span>
          </div>
          <!-- Rating breakdown -->
          ${[5,4,3,2,1].map(star=>{
            const cnt=reviews.filter(r=>r.rating===star).length;
            const pct=reviews.length?Math.round(cnt/reviews.length*100):0;
            return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px">
              <span style="width:16px;color:#F57F17">${star}★</span>
              <div style="flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden"><div style="height:100%;background:#F57F17;width:${pct}%"></div></div>
              <span style="width:24px;color:var(--muted);text-align:right">${cnt}</span>
            </div>`;
          }).join('')}
          <div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
            ${reviews.slice(0,3).map(r=>`
              <div style="padding:7px 0;border-bottom:1px solid #fafafa;font-size:12px">
                <div style="display:flex;justify-content:space-between"><span style="font-weight:600">${r.customer}</span><span style="color:#F57F17">${'★'.repeat(r.rating)}</span></div>
                <div style="color:var(--muted);margin-top:2px">"${r.text}"</div>
              </div>`).join('')}
          </div>
          <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px" onclick="showAllReviews()">See all ${reviews.length} reviews</button>
        </div>

        <!-- Danger zone -->
        <div class="card">
          <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:#d32f2f">⚠️ Danger zone</div>
          <button class="btn btn-danger" style="width:100%;margin-bottom:8px" onclick="resetAll()">Reset all data (fresh start)</button>
          <div style="font-size:12px;color:var(--muted)">Deletes all products, orders, earnings. Cannot be undone.</div>
        </div>

      </div>
    </div>
  `;
}

// ── Shop type selector ──
function setShopType(type){
  shop.type = type;
  persist();
  refreshBadges();
  toast(type==='medical'?'🏥 Medical shop — Prescriptions tab unlocked!':'✓ Shop category saved!');
  renderProfile(); // re-render to update tile highlights
}

// ── Logo / Banner photo handlers ──
function handleLogo(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{shop.logo=e.target.result;persist();refreshBadges();toast('✓ Shop logo updated!');renderProfile();};
  r.readAsDataURL(file);
}
function handleBanner(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{shop.banner=e.target.result;persist();toast('✓ Banner updated!');renderProfile();};
  r.readAsDataURL(file);
}

function saveProfile(){
  shop.name=document.getElementById('s-name').value.trim()||shop.name;
  shop.desc=document.getElementById('s-desc').value.trim();
  shop.area=document.getElementById('s-area').value.trim();
  shop.hours=document.getElementById('s-hours').value.trim();
  shop.returnPolicy=document.getElementById('s-return').value.trim();
  shop.phone=document.getElementById('s-phone').value.trim();
  persist();refreshBadges();
  toast('✓ Shop details saved!');
  renderProfile();
}

function saveGST(){
  shop.gst=document.getElementById('s-gst').value.trim().toUpperCase();
  persist();
  toast(shop.gst?'✓ GST number saved!':'GST number cleared.');
  renderProfile();
}

function savePayments(){
  shop.upi=document.getElementById('s-upi').value.trim();
  shop.bankHolder=document.getElementById('s-bank-holder').value.trim();
  shop.bankAccount=document.getElementById('s-bank-acc').value.trim();
  shop.bankIFSC=document.getElementById('s-bank-ifsc').value.trim().toUpperCase();
  shop.bankName=document.getElementById('s-bank-name').value.trim();
  persist();
  toast('✓ Payout details saved!');
  renderProfile();
}

// ── Holiday mode ──
function toggleHoliday(){
  shop.holidayMode=!shop.holidayMode;
  if(!shop.holidayMode)shop.holidayUntil='';
  shopOpen=!shop.holidayMode;
  persist();refreshBadges();
  toast(shop.holidayMode?'🏖️ Holiday mode ON — shop is paused':'✅ Back from holiday — shop is open!');
  renderProfile();
}
function saveHolidayDate(){
  shop.holidayUntil=document.getElementById('s-holiday-date')?.value||'';
  persist();
  toast(shop.holidayUntil?'Return date saved: '+new Date(shop.holidayUntil).toLocaleDateString('en-IN',{day:'numeric',month:'long'}):'Date cleared.');
}

function resetAll(){
  if(!confirm('This will delete everything — all products, orders, earnings. Are you sure?'))return;
  ['haatke_seeded','haatke_products','haatke_orders','haatke_shop','haatke_prescriptions','haatke_reviews','haatke_shop_open','haatke_cod_failures','haatke_drafts'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),3500);
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
document.getElementById('today-date').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
refreshBadges();
go('dashboard');
</script>
</body>
</html>
